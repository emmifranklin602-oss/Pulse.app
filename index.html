<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse App Prototype Enhanced</title>
<style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f7; }
    .hidden { display: none; }
    .active { display: block; }

    /* Top Nav */
    .nav { display: flex; justify-content: space-around; background: #fff; padding: 10px 0; position: fixed; bottom: 0; width: 100%; box-shadow: 0 -2px 6px rgba(0,0,0,0.1); }
    .nav button { border: none; background: none; font-size: 16px; cursor: pointer; }
    .nav button.active-tab { color: #007BFF; font-weight: bold; }

    /* Screens */
    .screen { display: none; padding: 60px 20px 80px 20px; min-height: 100vh; box-sizing: border-box; }

    /* Loading Screen */
    #loadingScreen { text-align: center; padding: 40px; font-size: 24px; }
</style>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDbQbNhFbe2qUA_A50Lsi3nPM5P9_kzF74",
  authDomain: "pulse1-9ec8b.firebaseapp.com",
  databaseURL: "https://pulse1-9ec8b-default-rtdb.firebaseio.com",
  projectId: "pulse1-9ec8b",
  storageBucket: "pulse1-9ec8b.appspot.com",
  messagingSenderId: "588669674303",
  appId: "1:588669674303:web:d10003b6aa219a8d15e98a",
  measurementId: "G-SNLP8XJ1GB"
};

// Initialize Firebase
const app = firebase.initializeApp(firebaseConfig);
const analytics = firebase.analytics();
const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

// ================= AUTH STATE HANDLING =================

// Hide everything first
document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
document.querySelector('.nav').style.display = 'none';

// Listen for Firebase auth changes
auth.onAuthStateChanged(user => {
    document.getElementById('loadingScreen').style.display = 'none';

    if (user) {
        // User is signed in → show main UI
        document.getElementById('loginScreen').style.display = 'none';
        document.querySelector('.nav').style.display = 'flex';
        document.getElementById('home').style.display = 'block';
    } else {
        // No user → show only login
        document.getElementById('loginScreen').style.display = 'block';
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.querySelector('.nav').style.display = 'none';
    }
});

// =============== AUTH ACTIONS =================
function signUp(){
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    auth.createUserWithEmailAndPassword(email, pass)
    .then(userCredential => {
        alert('Account Created!');
        db.ref('users/' + userCredential.user.uid).set({
            email: email,
            createdAt: Date.now()
        });
    })
    .catch(err => alert(err.message));
}

function login(){
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    auth.signInWithEmailAndPassword(email, pass)
    .then(() => alert('Logged in!'))
    .catch(err => alert(err.message));
}

function logout(){
    auth.signOut();
    alert('Logged out!');
}

// =============== UI INTERACTIONS =================
function switchScreen(screenId, btn) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.getElementById(screenId).style.display = 'block';
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active-tab'));
    btn.classList.add('active-tab');
}

function react(btn){
    let span = btn.querySelector('span');
    span.textContent = parseInt(span.textContent) + 1;
}

function castVote(btn){
    let span = btn.nextElementSibling;
    span.textContent = parseInt(span.textContent) + 1;
    alert('Vote Cast!');
}
</script>
</head>
<body>

<div id="loadingScreen">Loading…</div>

<!-- Login -->
<div id="loginScreen">
    <h2>Welcome to Pulse</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signUp()">Sign Up</button>
</div>

<!-- Your original screens -->
<div id="home" class="screen"> … </div>
<div id="groups" class="screen"> … </div>
<div id="voting" class="screen"> … </div>
<div id="ai" class="screen"> … </div>
<div id="profile" class="screen"> … </div>

<!-- Bottom Nav -->
<div class="nav">
    <button class="active-tab" onclick="switchScreen('home',this)">Home</button>
    <button onclick="switchScreen('groups',this)">Groups</button>
    <button onclick="switchScreen('voting',this)">Voting</button>
    <button onclick="switchScreen('ai',this)">AI</button>
    <button onclick="switchScreen('profile',this)">Profile</button>
</div>

</body>
</html>
