<!DOCTYPE html>
<html>
<head>
  <title>Pulse App - Login</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
    input { margin: 5px; padding: 10px; width: 250px; }
    button { padding: 10px 20px; margin: 5px; }
    #status { margin-top: 10px; color: green; }
  </style>
</head>
<body>
  <h2>Welcome to Pulse</h2>
  <p>Sign up or log in to continue</p>

  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
  <p id="status"></p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const client = window.supabase.createClient(
      "https://czqxzvbggafuwedycdfm.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
    );

    async function signup() {
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;
      let { error } = await client.auth.signUp({ email, password });
      document.getElementById("status").textContent = error ? error.message : "Signed up!";
    }

    async function login() {
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;
      let { error } = await client.auth.signInWithPassword({ email, password });
      if (error) {
        document.getElementById("status").textContent = error.message;
      } else {
        window.location.href = "chat.html"; // redirect to chat after login
      }
    }

    async function logout() {
      await client.auth.signOut();
      document.getElementById("status").textContent = "Logged out!";
    }
  </script>
</body>
</html>
